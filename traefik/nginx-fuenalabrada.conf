server {
    listen 80;
    server_name _;

    location ~ ^/(contracts|catalog|data-offers|assets|policies|transfer-history|vault-secrets)(/.*)?$ {
        return 302 /conectorfuenalabrada$uri$is_args$args;
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location /api/management/ {
        proxy_pass http://conectorfuenalabrada:11002/api/management/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-api-key "change-me";
    }

    location = /api/management {
        proxy_pass http://conectorfuenalabrada:11002/api/management;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header x-api-key "change-me";
    }

    location /conectorfuenalabrada/api/management/ {
        rewrite ^/conectorfuenalabrada/api/management/(.*)$ /api/management/$1 break;
        proxy_pass http://conectorfuenalabrada:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorfuenalabrada;
        proxy_set_header x-api-key "change-me";
    }

    location = /conectorfuenalabrada/api/management {
        rewrite ^/conectorfuenalabrada/api/management$ /api/management break;
        proxy_pass http://conectorfuenalabrada:11002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorfuenalabrada;
        proxy_set_header x-api-key "change-me";
    }

    location /api/v1/dsp {
        proxy_pass http://conectorfuenalabrada:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /conectorfuenalabrada/health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /conectorfuenalabrada {
        return 301 /conectorfuenalabrada/;
    }

    location /conectorfuenalabrada/api/v1/dsp {
        rewrite ^/conectorfuenalabrada/api/v1/dsp/?(.*)$ /api/v1/dsp/$1 break;
        proxy_pass http://conectorfuenalabrada:11003/api/v1/dsp;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorfuenalabrada;
    }

    location /conectorfuenalabrada/local-assets/ {
        rewrite ^/conectorfuenalabrada/local-assets/(.*)$ /v1/local-assets/$1 break;
        proxy_pass http://conectorfuenalabrada-local-assets:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorfuenalabrada;
    }

    location /conectorfuenalabrada/ {
        rewrite ^/conectorfuenalabrada/(.*)$ /$1 break;
        proxy_pass http://conectorfuenalabrada-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /conectorfuenalabrada;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        sub_filter_once off;
        sub_filter_types text/html;
        sub_filter 'href="/_next/' 'href="/conectorfuenalabrada/_next/';
        sub_filter 'src="/_next/' 'src="/conectorfuenalabrada/_next/';
        sub_filter 'href="/sovity_logo.svg"' 'href="/conectorfuenalabrada/sovity_logo.svg"';
        sub_filter 'src="/sovity_logo.svg"' 'src="/conectorfuenalabrada/sovity_logo.svg"';
        sub_filter 'href="/' 'href="/conectorfuenalabrada/';
        sub_filter 'src="/' 'src="/conectorfuenalabrada/';
    }

    location / {
        proxy_pass http://conectorfuenalabrada-ui:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
